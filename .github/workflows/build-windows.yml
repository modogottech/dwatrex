name: Build Windows Installer

# Build the installer on GitHub's Windows runners.
#  - Runs on every push to main/master and on version tags (v1.0.0, etc.)
#  - Can also be triggered manually from the Actions tab ("Run workflow")
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # needed to attach the installer to a Release on tags

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build app + reset tool (PyInstaller)
        run: python build.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile the installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Upload installer as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DwatrexSetup
          path: installer_output/DwatrexSetup.exe
          if-no-files-found: error

      # When you push a tag like v1.0.0, also publish the installer as a GitHub Release.
      - name: Attach installer to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/DwatrexSetup.exe
